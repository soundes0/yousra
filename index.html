<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invitation - Yousra & Aymen</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Hero Section -->
  <header class="hero text-center text-white d-flex align-items-center justify-content-center">
    <div>
      <h1 class="display-3">Yousra & Aymen</h1>
      <p class="lead">December 18, 2024 | Zouaoui, Dinner</p>
    </div>
  </header>

  
 
  <section class="wish-section my-5">
    <div class="container py-5">
      <h2 class="section-title text-center mb-4">Leave Your Wishes</h2>
      <p class="section-subtitle text-center mb-4">
        Your heartfelt messages will make Yousra's day even brighter!
        <br>
        <span id="countdown" class="countdown"></span>
      </p>
      
      <form id="wish-form" class="wish-form mx-auto text-center">
        <div class="mb-4">
          <input type="text" id="name" class="form-control wish-input" placeholder="Your Name" required>
        </div>
        <div class="mb-4">
          <textarea id="message" class="form-control wish-input" rows="4" placeholder="Write your heartfelt message"></textarea>
        </div>
        <button type="button" id="submit-btn" class="btn btn-wish">Send Your Wish</button>
      </form>
  
      <div id="wish-board" class="wish-board mt-5">
        <p class="text-center" id="placeholder-message">No wishes yet. Be the first to share your thoughts!</p>
      </div>
    </div>
  </section>
  

  <!-- Footer -->
  <footer class="text-center py-3">
    <p>© 2024 Yousra & Aymen's Wedding</p>
  </footer>
</body>
</html>
